<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Temperature Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-md bg-slate-800 rounded-2xl shadow-xl border border-slate-700 p-6 space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-teal-400 tracking-wide">IoT Temperature System</h1>
            <p class="text-sm text-slate-400 mt-1">Live BLUHUB VPS Streams</p>
        </div>

        <hr class="border-slate-700">

        <div class="flex flex-col items-center justify-center py-4 bg-slate-900/50 rounded-xl border border-slate-700/50">
            <span class="text-xs font-semibold tracking-widest text-slate-400 uppercase">Current Reading</span>
            <div class="flex items-baseline mt-2">
                <span id="temp-display" class="text-6xl font-extrabold text-teal-400 transition-all duration-300">--.-</span>
                <span class="text-3xl font-bold text-slate-400 ml-1">°C</span>
            </div>
        </div>

        <div class="space-y-3 text-sm">
            <div class="flex justify-between items-center bg-slate-900 p-3 rounded-lg">
                <span class="text-slate-400">Broker Status:</span>
                <span id="status-badge" class="px-2.5 py-0.5 rounded-full text-xs font-bold bg-amber-500/20 text-amber-400 animate-pulse">Connecting...</span>
            </div>
            <div class="flex justify-between items-center bg-slate-900 p-3 rounded-lg">
                <span class="text-slate-400">Last Update:</span>
                <span id="timestamp" class="text-slate-300 font-mono">--:--:--</span>
            </div>
        </div>
    </div>

    <script>
        // Use HiveMQ public WebSockets port (8000)
        const brokerUrl = 'ws://broker.hivemq.com:8000/mqtt';
        const topic = 'vps/candidate/temperature';

        const tempDisplay = document.getElementById('temp-display');
        const statusBadge = document.getElementById('status-badge');
        const timestampDisplay = document.getElementById('timestamp');

        console.log("Connecting to HiveMQ via WebSockets...");
        const client = mqtt.connect(brokerUrl);

        client.on('connect', () => {
            console.log("Connected to HiveMQ Successfully!");
            statusBadge.innerText = "Connected";
            statusBadge.className = "px-2.5 py-0.5 rounded-full text-xs font-bold bg-emerald-500/20 text-emerald-400";
            client.subscribe(topic);
        });

        client.on('message', (receivedTopic, message) => {
            if (receivedTopic === topic) {
                const payload = message.toString();
                console.log("New Data:", payload);
                
                // Update Dashboard Values
                tempDisplay.innerText = parseFloat(payload).toFixed(1);
                
                const now = new Date();
                timestampDisplay.innerText = now.toLocaleTimeString();
            }
        });

        client.on('error', (err) => {
            console.error("Connection error: ", err);
            statusBadge.innerText = "Error";
            statusBadge.className = "px-2.5 py-0.5 rounded-full text-xs font-bold bg-rose-500/20 text-rose-400";
        });
    </script>
</body>
</html>
